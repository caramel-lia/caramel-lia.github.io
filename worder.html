<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angela's Word Game 🧸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
        }
        .haiku-font {
            font-family: 'Playfair Display', serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .timer-bar {
            transition: width 1s linear, background-color 0.5s ease;
        }
        .timer-pulse {
            animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: -1;
            animation: drift 20s infinite alternate;
        }
        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, -30px); }
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4 text-white relative overflow-hidden">

    <!-- Ambient Background Shapes -->
    <div class="bg-shape w-96 h-96 bg-purple-600 top-0 left-0"></div>
    <div class="bg-shape w-80 h-80 bg-blue-600 bottom-0 right-0" style="animation-delay: -5s;"></div>
    <div class="bg-shape w-64 h-64 bg-indigo-500 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2" style="animation-delay: -10s;"></div>

    <!-- Floating Hearts/Stars Decoration -->
    <div class="absolute top-10 left-10 text-2xl opacity-30 animate-float" style="animation-delay: 0s;">💜</div>
    <div class="absolute bottom-20 right-10 text-3xl opacity-30 animate-float" style="animation-delay: 1s;">💙</div>
    <div class="absolute top-1/3 right-20 text-xl opacity-20 animate-float" style="animation-delay: 2s;">✨</div>

    <!-- Main Game Card -->
    <div class="glass-panel rounded-3xl p-8 w-full max-w-md text-center relative">
        
        <!-- Teddy Bear Mascot (Peeking over the top) -->
        <div class="absolute -top-10 left-1/2 transform -translate-x-1/2 text-7xl animate-float drop-shadow-2xl filter">
            🧸
        </div>

        <!-- Header -->
        <div class="mb-8 mt-6">
            <h1 class="text-3xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-purple-200 via-white to-blue-200 glow-text">
                Angela's Word Game
            </h1>
            <p class="text-purple-200/80 text-sm font-medium tracking-wide">Unscramble a new word every round!</p>
        </div>

        <!-- Menu Screen -->
        <div id="menu-screen" class="space-y-5">
            <p class="text-lg text-blue-100 font-semibold mb-6">Choose your difficulty, my love:</p>
            <div class="space-y-3">
                <button onclick="startGame('easy')" class="group w-full py-3.5 px-6 bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-400/30 hover:border-emerald-400/60 rounded-2xl font-bold transition-all duration-300 transform hover:scale-[1.02] hover:shadow-lg hover:shadow-emerald-500/20 flex items-center justify-center gap-3">
                    <span class="text-2xl group-hover:scale-110 transition-transform">🌱</span> 
                    <span>Easy <span class="text-emerald-200 font-normal text-sm ml-1">(4 letters, 30s)</span></span>
                </button>
                <button onclick="startGame('medium')" class="group w-full py-3.5 px-6 bg-blue-500/20 hover:bg-blue-500/30 border border-blue-400/30 hover:border-blue-400/60 rounded-2xl font-bold transition-all duration-300 transform hover:scale-[1.02] hover:shadow-lg hover:shadow-blue-500/20 flex items-center justify-center gap-3">
                    <span class="text-2xl group-hover:scale-110 transition-transform">🌊</span> 
                    <span>Medium <span class="text-blue-200 font-normal text-sm ml-1">(6 letters, 20s)</span></span>
                </button>
                <button onclick="startGame('hard')" class="group w-full py-3.5 px-6 bg-purple-500/20 hover:bg-purple-500/30 border border-purple-400/30 hover:border-purple-400/60 rounded-2xl font-bold transition-all duration-300 transform hover:scale-[1.02] hover:shadow-lg hover:shadow-purple-500/20 flex items-center justify-center gap-3">
                    <span class="text-2xl group-hover:scale-110 transition-transform">🔥</span> 
                    <span>Hard <span class="text-purple-200 font-normal text-sm ml-1">(8 letters, 15s)</span></span>
                </button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden space-y-6">
            <div class="flex justify-between items-center text-sm font-semibold text-purple-200/80 bg-black/20 rounded-xl p-3">
                <span class="flex items-center gap-2">✨ Score: <span id="score-display" class="text-white text-xl font-bold">0</span></span>
                <span class="flex items-center gap-2">⏱️ Time: <span id="time-display" class="text-white text-xl font-bold">0</span>s</span>
            </div>
            
            <!-- Timer Bar -->
            <div class="w-full bg-black/30 rounded-full h-2.5 overflow-hidden shadow-inner">
                <div id="timer-bar" class="timer-bar h-full bg-gradient-to-r from-blue-400 to-purple-400 rounded-full shadow-[0_0_10px_rgba(167,139,250,0.5)]" style="width: 100%;"></div>
            </div>

            <div class="py-2">
                <p class="text-xs text-purple-300/80 mb-3 uppercase tracking-[0.2em] font-semibold">Unscramble this word</p>
                <div id="scrambled-word" class="text-4xl md:text-5xl font-bold tracking-[0.15em] text-white glow-text break-words min-h-[4rem] flex items-center justify-center transition-all duration-300">
                    -----
                </div>
            </div>

            <div class="space-y-4">
                <input type="text" id="word-input" autocomplete="off" 
                    class="w-full px-4 py-4 rounded-2xl bg-white/5 border border-white/20 text-white placeholder-white/30 text-center text-2xl font-bold tracking-widest focus:outline-none focus:ring-2 focus:ring-purple-400/50 focus:bg-white/10 focus:border-purple-400/50 transition-all duration-300 uppercase"
                    placeholder="TYPE HERE">
                
                <button onclick="checkAnswer()" class="w-full py-4 px-6 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 rounded-2xl font-bold text-lg transition-all duration-300 transform hover:scale-[1.02] hover:shadow-xl hover:shadow-purple-500/25 border border-white/10">
                    Submit Answer
                </button>

                <!-- Action Buttons: Reshuffle & Skip -->
                <div class="flex gap-3 pt-2">
                    <button onclick="reshuffleWord()" class="flex-1 py-3 px-4 bg-white/10 hover:bg-white/20 border border-white/20 hover:border-purple-400/50 rounded-xl font-semibold transition-all duration-300 flex items-center justify-center gap-2 text-sm group">
                        <span class="group-hover:rotate-180 transition-transform duration-500">🔀</span> Reshuffle
                    </button>
                    <button onclick="skipWord()" class="flex-1 py-3 px-4 bg-white/10 hover:bg-white/20 border border-white/20 hover:border-blue-400/50 rounded-xl font-semibold transition-all duration-300 flex items-center justify-center gap-2 text-sm">
                        ⏭️ Skip <span class="text-xs opacity-70">(-3s)</span>
                    </button>
                </div>
            </div>
            <p id="feedback" class="text-sm h-6 font-bold tracking-wide transition-all duration-300"></p>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="hidden space-y-6">
            <div class="text-6xl mb-2 animate-bounce drop-shadow-lg">🧸💜</div>
            <h2 class="text-2xl font-bold text-white">Round Complete!</h2>
            <div class="inline-block px-6 py-2 bg-white/10 rounded-full border border-white/20">
                <p class="text-purple-200">Final Score: <span id="final-score" class="text-3xl font-bold text-white ml-1">0</span></p>
            </div>
            
            <!-- Haiku Container (shown if score >= 30) -->
            <div id="haiku-container" class="bg-gradient-to-br from-white/10 to-white/5 rounded-2xl p-6 border border-white/20 my-6 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-purple-400 to-transparent"></div>
                <p class="text-xs text-purple-300 uppercase tracking-[0.2em] mb-4 font-semibold" id="haiku-title">A Haiku for Angela</p>
                <p class="haiku-font text-xl italic text-blue-100 leading-relaxed" id="haiku-text">
                    <!-- Haiku injected via JS -->
                </p>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-400 to-transparent"></div>
            </div>

            <!-- Fallback message (shown if score < 30) -->
            <div id="fallback-message" class="hidden bg-gradient-to-br from-white/10 to-white/5 rounded-2xl p-6 border border-white/20 my-6 text-center">
                <p class="text-4xl mb-3">🧸</p>
                <p class="text-lg text-blue-100 font-semibold">Keep trying, my love!</p>
                <p class="text-sm text-purple-200 mt-2">Score 30 or more to unlock your special haiku.</p>
            </div>

            <button onclick="showMenu()" class="w-full py-4 px-6 bg-white/10 hover:bg-white/20 border border-white/30 hover:border-white/50 rounded-2xl font-bold transition-all duration-300 transform hover:scale-[1.02] flex items-center justify-center gap-2">
                <span>🔄</span> Play Again
            </button>
        </div>

    </div>

    <script>
        // Game State
        let currentWord = '';
        let score = 0;
        let timeLeft = 0;
        let maxTime = 0;
        let timerInterval = null;
        let difficulty = 'easy';
        let usedWords = new Set();

        // Unique Haikus for each difficulty (5-7-5 syllables)
        const haikus = {
            easy: "Soft and gentle light,<br>Angela, you shine so bright,<br>Teddy holds you tight.",
            medium: "Gentle summer breeze,<br>Angela, you put at ease,<br>My love will not cease.",
            hard: "Deep in purple skies,<br>Angela, my heart replies,<br>Love that never dies."
        };

        const fallbackWords = {
            easy: ['love', 'star', 'moon', 'bear', 'blue', 'pure', 'hope', 'kiss', 'glow', 'soft'],
            medium: ['puzzle', 'garden', 'summer', 'breeze', 'planet', 'cookie', 'purple', 'flower', 'teddyb'],
            hard: ['beautiful', 'wonderful', 'chocolate', 'adventure', 'butterfly', 'sunflower', 'rainbow', 'diamond']
        };

        const difficultySettings = {
            easy: { length: 4, time: 30 },
            medium: { length: 6, time: 20 },
            hard: { length: 8, time: 15 }
        };

        function showMenu() {
            clearInterval(timerInterval);
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0;
            usedWords.clear();
            updateScore();
        }

        async function fetchWord(length) {
            try {
                const query = '?'.repeat(length);
                const response = await fetch(`https://api.datamuse.com/words?sp=${query}&max=100`);
                const data = await response.json();
                
                const validWords = data
                    .filter(item => /^[a-zA-Z]+$/.test(item.word) && item.word.length === length)
                    .map(item => item.word.toLowerCase());
                
                const unusedWords = validWords.filter(word => !usedWords.has(word));
                
                if (unusedWords.length > 0) {
                    const randomWord = unusedWords[Math.floor(Math.random() * unusedWords.length)];
                    usedWords.add(randomWord);
                    return randomWord;
                }
            } catch (error) {
                console.log("API fallback triggered");
            }
            
            const fallbackPool = difficulty === 'easy' ? fallbackWords.easy : 
                                 difficulty === 'medium' ? fallbackWords.medium : fallbackWords.hard;
            
            const unusedFallbacks = fallbackPool.filter(word => !usedWords.has(word));
            
            if (unusedFallbacks.length > 0) {
                const randomWord = unusedFallbacks[Math.floor(Math.random() * unusedFallbacks.length)];
                usedWords.add(randomWord);
                return randomWord;
            }
            
            usedWords.clear();
            return fallbackPool[Math.floor(Math.random() * fallbackPool.length)];
        }

        function scrambleWord(word) {
            let scrambled = word.split('');
            let maxAttempts = 20;
            do {
                for (let i = scrambled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [scrambled[i], scrambled[j]] = [scrambled[j], scrambled[i]];
                }
                maxAttempts--;
            } while (scrambled.join('') === word && maxAttempts > 0 && word.length > 1);
            return scrambled.join('');
        }

        async function startGame(selectedDifficulty) {
            difficulty = selectedDifficulty;
            const settings = difficultySettings[difficulty];
            maxTime = settings.time;
            timeLeft = maxTime;
            score = 0;
            usedWords.clear();
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            updateScore();
            await nextRound();
            startTimer();
            
            setTimeout(() => document.getElementById('word-input').focus(), 100);
        }

        async function nextRound() {
            const length = difficultySettings[difficulty].length;
            currentWord = await fetchWord(length);
            const scrambled = scrambleWord(currentWord);
            
            const scrambledEl = document.getElementById('scrambled-word');
            scrambledEl.style.opacity = '0';
            scrambledEl.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                scrambledEl.textContent = scrambled.toUpperCase();
                scrambledEl.style.opacity = '1';
                scrambledEl.style.transform = 'scale(1)';
            }, 200);
            
            document.getElementById('word-input').value = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('word-input').classList.remove('border-red-400', 'border-emerald-400', 'shake');
            document.getElementById('word-input').focus();
        }

        function reshuffleWord() {
            const scrambled = scrambleWord(currentWord);
            const scrambledEl = document.getElementById('scrambled-word');
            
            // Fun spin animation
            scrambledEl.style.opacity = '0';
            scrambledEl.style.transform = 'scale(0.8) rotate(-10deg)';
            
            setTimeout(() => {
                scrambledEl.textContent = scrambled.toUpperCase();
                scrambledEl.style.opacity = '1';
                scrambledEl.style.transform = 'scale(1) rotate(0deg)';
            }, 250);
            
            document.getElementById('word-input').value = '';
            document.getElementById('word-input').focus();
        }

        function skipWord() {
            // Friendly 3-second penalty to prevent spamming
            timeLeft = Math.max(0, timeLeft - 3);
            updateTimerDisplay();
            
            const feedback = document.getElementById('feedback');
            feedback.textContent = 'Skipped! (-3s) ⏱️';
            feedback.className = 'text-sm h-6 font-bold tracking-wide text-yellow-300';
            
            setTimeout(() => {
                nextRound();
            }, 400);
        }

        function startTimer() {
            clearInterval(timerInterval);
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('time-display').textContent = timeLeft;
            const percentage = (timeLeft / maxTime) * 100;
            const bar = document.getElementById('timer-bar');
            bar.style.width = `${percentage}%`;
            
            const timerDisplay = document.getElementById('time-display').parentElement;
            
            if (percentage < 30) {
                bar.className = 'timer-bar h-full bg-red-500 rounded-full timer-pulse';
                timerDisplay.classList.add('text-red-400');
                timerDisplay.classList.remove('text-white');
            } else if (percentage < 60) {
                bar.className = 'timer-bar h-full bg-yellow-400 rounded-full';
                timerDisplay.classList.remove('text-red-400', 'text-white');
                timerDisplay.classList.add('text-yellow-300');
            } else {
                bar.className = 'timer-bar h-full bg-gradient-to-r from-blue-400 to-purple-400 rounded-full shadow-[0_0_10px_rgba(167,139,250,0.5)]';
                timerDisplay.classList.remove('text-red-400', 'text-yellow-300');
                timerDisplay.classList.add('text-white');
            }
        }

        function checkAnswer() {
            const input = document.getElementById('word-input').value.trim().toLowerCase();
            const feedback = document.getElementById('feedback');
            const inputEl = document.getElementById('word-input');

            if (!input) return;

            if (input === currentWord) {
                score += 10 + Math.ceil(timeLeft / 2);
                updateScore();
                feedback.textContent = '✨ Correct! Beautiful job! ✨';
                feedback.className = 'text-sm h-6 font-bold tracking-wide text-emerald-300';
                inputEl.classList.add('border-emerald-400', 'bg-emerald-500/10');
                inputEl.classList.remove('border-white/20');
                
                setTimeout(() => {
                    inputEl.classList.remove('border-emerald-400', 'bg-emerald-500/10');
                    inputEl.classList.add('border-white/20');
                    nextRound();
                }, 800);
            } else {
                feedback.textContent = 'Try again, my love! 💜';
                feedback.className = 'text-sm h-6 font-bold tracking-wide text-red-300';
                inputEl.classList.add('border-red-400', 'shake', 'bg-red-500/10');
                inputEl.classList.remove('border-white/20');
                
                setTimeout(() => {
                    inputEl.classList.remove('shake', 'border-red-400', 'bg-red-500/10');
                    inputEl.classList.add('border-white/20');
                    document.getElementById('word-input').value = '';
                    document.getElementById('word-input').focus();
                }, 500);
            }
        }

        function updateScore() {
            document.getElementById('score-display').textContent = score;
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
            
            const haikuContainer = document.getElementById('haiku-container');
            const fallbackMessage = document.getElementById('fallback-message');
            const haikuText = document.getElementById('haiku-text');
            const haikuTitle = document.getElementById('haiku-title');
            
            if (score >= 30) {
                // Inject the specific haiku for the difficulty played
                haikuText.innerHTML = haikus[difficulty];
                
                // Update title to reflect the difficulty
                const diffName = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
                haikuTitle.textContent = `A ${diffName} Haiku for Angela`;
                
                haikuContainer.classList.remove('hidden');
                fallbackMessage.classList.add('hidden');
            } else {
                haikuContainer.classList.add('hidden');
                fallbackMessage.classList.remove('hidden');
            }
        }

        document.getElementById('word-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
