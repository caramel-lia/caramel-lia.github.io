<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angela's Word Game 🧸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .timer-bar {
            transition: width 1s linear;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-700 via-blue-600 to-purple-800 flex items-center justify-center p-4 text-white">

    <div class="glass-panel rounded-3xl shadow-2xl p-8 w-full max-w-md text-center relative overflow-hidden">
        
        <!-- Teddy Bear Mascot -->
        <div class="absolute -top-6 -right-6 text-6xl animate-float drop-shadow-lg" title="Cheering for Angela!">
            🧸
        </div>
        <div class="absolute -bottom-4 -left-4 text-5xl opacity-50 animate-float" style="animation-delay: 1.5s;">
            💜
        </div>

        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-purple-200 to-blue-200">
                Angela's Word Game
            </h1>
            <p class="text-purple-200 text-sm">Unscramble the word before time runs out!</p>
        </div>

        <!-- Menu Screen -->
        <div id="menu-screen" class="space-y-6">
            <div class="text-5xl mb-4">🧸</div>
            <p class="text-lg text-blue-100">Choose your difficulty, my love:</p>
            <div class="space-y-3">
                <button onclick="startGame('easy')" class="w-full py-3 px-6 bg-green-500/80 hover:bg-green-400 rounded-xl font-bold transition-all transform hover:scale-105 shadow-lg border border-green-400/30">
                    🌱 Easy (4 letters, 30s)
                </button>
                <button onclick="startGame('medium')" class="w-full py-3 px-6 bg-blue-500/80 hover:bg-blue-400 rounded-xl font-bold transition-all transform hover:scale-105 shadow-lg border border-blue-400/30">
                    🌊 Medium (6 letters, 20s)
                </button>
                <button onclick="startGame('hard')" class="w-full py-3 px-6 bg-purple-500/80 hover:bg-purple-400 rounded-xl font-bold transition-all transform hover:scale-105 shadow-lg border border-purple-400/30">
                    🔥 Hard (8 letters, 15s)
                </button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden space-y-6">
            <div class="flex justify-between items-center text-sm font-semibold text-purple-200 mb-2">
                <span>Score: <span id="score-display" class="text-white text-lg">0</span></span>
                <span>Time: <span id="time-display" class="text-white text-lg">0</span>s</span>
            </div>
            
            <!-- Timer Bar -->
            <div class="w-full bg-black/20 rounded-full h-3 overflow-hidden">
                <div id="timer-bar" class="timer-bar h-full bg-gradient-to-r from-blue-400 to-purple-400 rounded-full" style="width: 100%;"></div>
            </div>

            <div class="py-6">
                <p class="text-sm text-purple-200 mb-2 uppercase tracking-widest">Unscramble this word:</p>
                <div id="scrambled-word" class="text-4xl font-bold tracking-widest text-white drop-shadow-md break-words">
                    -----
                </div>
            </div>

            <div class="space-y-3">
                <input type="text" id="word-input" autocomplete="off" 
                    class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/30 text-white placeholder-purple-200/50 text-center text-xl font-bold focus:outline-none focus:ring-2 focus:ring-purple-400 focus:bg-white/20 transition-all uppercase"
                    placeholder="Type your answer...">
                <button onclick="checkAnswer()" class="w-full py-3 px-6 bg-gradient-to-r from-purple-500 to-blue-500 hover:from-purple-400 hover:to-blue-400 rounded-xl font-bold transition-all transform hover:scale-105 shadow-lg">
                    Submit Answer
                </button>
            </div>
            <p id="feedback" class="text-sm h-6 font-semibold"></p>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="hidden space-y-6">
            <div class="text-6xl mb-2 animate-bounce">🧸💜</div>
            <h2 class="text-2xl font-bold text-white">Game Over!</h2>
            <p class="text-purple-200">Final Score: <span id="final-score" class="text-3xl font-bold text-white">0</span></p>
            
            <div class="bg-white/10 rounded-2xl p-6 border border-white/20 my-6">
                <p class="text-xs text-purple-300 uppercase tracking-widest mb-3">A Haiku for Angela</p>
                <p class="text-lg italic text-blue-100 leading-relaxed">
                    Stars of purple hue,<br>
                    Angela, I love you true,<br>
                    Teddy smiles at you.
                </p>
            </div>

            <button onclick="showMenu()" class="w-full py-3 px-6 bg-white/20 hover:bg-white/30 border border-white/40 rounded-xl font-bold transition-all transform hover:scale-105">
                Play Again
            </button>
        </div>

    </div>

    <script>
        // Game State
        let currentWord = '';
        let score = 0;
        let timeLeft = 0;
        let maxTime = 0;
        let timerInterval = null;
        let difficulty = 'easy';

        // Fallback words in case API fails
        const fallbackWords = {
            easy: ['love', 'star', 'moon', 'bear', 'blue', 'pure', 'hope', 'kiss'],
            medium: ['puzzle', 'garden', 'summer', 'breeze', 'planet', 'teddyb', 'purple'],
            hard: ['beautiful', 'wonderful', 'chocolate', 'adventure', 'butterfly', 'sunflower']
        };

        const difficultySettings = {
            easy: { length: 4, time: 30 },
            medium: { length: 6, time: 20 },
            hard: { length: 8, time: 15 }
        };

        function showMenu() {
            clearInterval(timerInterval);
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0;
            updateScore();
        }

        async function fetchWord(length) {
            try {
                // Datamuse API: sp=? matches exactly that many letters
                const query = '?'.repeat(length);
                const response = await fetch(`https://api.datamuse.com/words?sp=${query}&max=5`);
                const data = await response.json();
                
                // Filter out words with non-alphabetic characters
                const validWords = data.filter(item => /^[a-zA-Z]+$/.test(item.word));
                if (validWords.length > 0) {
                    return validWords[Math.floor(Math.random() * validWords.length)].word.toLowerCase();
                }
            } catch (error) {
                console.log("API fallback triggered");
            }
            // Fallback if API fails or returns empty
            const fallback = fallbackWords[difficulty === 'easy' ? 'easy' : difficulty === 'medium' ? 'medium' : 'hard'];
            return fallback[Math.floor(Math.random() * fallback.length)];
        }

        function scrambleWord(word) {
            let scrambled = word.split('');
            let maxAttempts = 10;
            
            // Ensure scrambled word is different from original
            do {
                for (let i = scrambled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [scrambled[i], scrambled[j]] = [scrambled[j], scrambled[i]];
                }
                maxAttempts--;
            } while (scrambled.join('') === word && maxAttempts > 0 && word.length > 1);
            
            return scrambled.join('');
        }

        async function startGame(selectedDifficulty) {
            difficulty = selectedDifficulty;
            const settings = difficultySettings[difficulty];
            maxTime = settings.time;
            timeLeft = maxTime;
            score = 0;
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            updateScore();
            await nextRound();
            startTimer();
            
            // Focus input
            setTimeout(() => document.getElementById('word-input').focus(), 100);
        }

        async function nextRound() {
            const length = difficultySettings[difficulty].length;
            currentWord = await fetchWord(length);
            const scrambled = scrambleWord(currentWord);
            
            document.getElementById('scrambled-word').textContent = scrambled.toUpperCase();
            document.getElementById('word-input').value = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('word-input').classList.remove('border-red-400', 'border-green-400');
        }

        function startTimer() {
            clearInterval(timerInterval);
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('time-display').textContent = timeLeft;
            const percentage = (timeLeft / maxTime) * 100;
            document.getElementById('timer-bar').style.width = `${percentage}%`;
            
            // Change color based on time left
            const bar = document.getElementById('timer-bar');
            if (percentage < 30) {
                bar.className = 'timer-bar h-full bg-red-500 rounded-full';
            } else if (percentage < 60) {
                bar.className = 'timer-bar h-full bg-yellow-400 rounded-full';
            } else {
                bar.className = 'timer-bar h-full bg-gradient-to-r from-blue-400 to-purple-400 rounded-full';
            }
        }

        function checkAnswer() {
            const input = document.getElementById('word-input').value.trim().toLowerCase();
            const feedback = document.getElementById('feedback');
            const inputEl = document.getElementById('word-input');

            if (!input) return;

            if (input === currentWord) {
                // Correct!
                score += 10 + Math.ceil(timeLeft / 2); // Bonus for speed
                updateScore();
                feedback.textContent = '✨ Correct! Beautiful job! ✨';
                feedback.className = 'text-sm h-6 font-semibold text-green-300';
                inputEl.classList.add('border-green-400');
                
                setTimeout(() => {
                    nextRound();
                }, 800);
            } else {
                // Incorrect
                feedback.textContent = 'Try again, my love! 💜';
                feedback.className = 'text-sm h-6 font-semibold text-red-300';
                inputEl.classList.add('border-red-400', 'shake');
                
                setTimeout(() => {
                    inputEl.classList.remove('shake', 'border-red-400');
                    document.getElementById('word-input').value = '';
                    document.getElementById('word-input').focus();
                }, 500);
            }
        }

        function updateScore() {
            document.getElementById('score-display').textContent = score;
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
        }

        // Allow "Enter" key to submit
        document.getElementById('word-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
