<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PoC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        #output {
            background: #1a1f2a;
            color: #00ff88;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #00ff88;
            max-width: 800px;
            width: 100%;
            min-height: 400px;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
            box-shadow: 0 0 30px rgba(0,255,136,0.1);
            overflow: auto;
        }
        #output .success { color: #00ff88; }
        #output .info { color: #66b3ff; }
        #output .warning { color: #ffaa44; }
        #output .error { color: #ff4466; }
        #output .cookie { color: #ff66ff; }
        #output .ip { color: #ffcc00; }
        #output .location { color: #66ffcc; }
        #output .header { 
            color: #ffffff; 
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        .status-dot.active { background: #00ff88; }
        .status-dot.waiting { background: #ffaa44; }
        .status-dot.error { background: #ff4466; }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.4; transform: scale(0.9); }
        }
        #log {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
            color: #8899bb;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div id="output">
    <div class="header">🔐 PWN2OWN CTF - PoC</div>
    <div id="log">[⏳] Initializing...</div>
</div>

<script>
// ============================================================
// PWN2OWN CTF - PoC (No camera, no GPS)
// IP-based geolocation only + document.cookie
// Multiple API fallbacks
// ============================================================

(function() {
    "use strict";

    const output = document.getElementById('output');
    const logElement = document.getElementById('log');
    let ipDataCaptured = false;

    function appendLog(message, type = 'info') {
        const classes = {
            'info': 'info',
            'success': 'success',
            'error': 'error',
            'warning': 'warning',
            'cookie': 'cookie',
            'ip': 'ip',
            'location': 'location'
        };
        const className = classes[type] || 'info';
        logElement.innerHTML += `<div class="${className}">${message}</div>`;
        output.scrollTop = output.scrollHeight;
    }

    // 1. Show initial status
    appendLog('[✅] PoC started', 'success');
    appendLog('[📱] Platform: ' + (/iPhone|iPad|iPod/i.test(navigator.userAgent) ? 'iOS' : 
              /Android/i.test(navigator.userAgent) ? 'Android' : 'Desktop'), 'info');

    // 2. Get IP and location using IP APIs only (no GPS)
    function getIPAndLocation() {
        appendLog('[🌐] Fetching IP and location data (IP-based only)...', 'info');
        
        // List of reliable IP geolocation APIs
        const apis = [
            {
                url: 'https://ipapi.co/json/',
                parser: (data) => ({ 
                    ip: data.ip || 'unknown',
                    city: data.city || 'unknown',
                    region: data.region || 'unknown',
                    country: data.country_name || 'unknown',
                    country_code: data.country || 'unknown',
                    lat: data.latitude || '0',
                    lon: data.longitude || '0',
                    isp: data.org || 'unknown',
                    timezone: data.timezone || 'unknown',
                    zip: data.postal || 'unknown',
                    source: 'ipapi.co'
                })
            },
            {
                url: 'https://ipinfo.io/json',
                parser: (data) => {
                    const loc = data.loc ? data.loc.split(',') : ['0', '0'];
                    return {
                        ip: data.ip || 'unknown',
                        city: data.city || 'unknown',
                        region: data.region || 'unknown',
                        country: data.country || 'unknown',
                        country_code: data.country || 'unknown',
                        lat: loc[0] || '0',
                        lon: loc[1] || '0',
                        isp: data.org || 'unknown',
                        timezone: data.timezone || 'unknown',
                        zip: data.postal || 'unknown',
                        source: 'ipinfo.io'
                    };
                }
            },
            {
                url: 'https://api.ipgeolocation.io/ipgeo',
                parser: (data) => ({
                    ip: data.ip || 'unknown',
                    city: data.city || 'unknown',
                    region: data.state_prov || 'unknown',
                    country: data.country_name || 'unknown',
                    country_code: data.country_code2 || 'unknown',
                    lat: data.latitude || '0',
                    lon: data.longitude || '0',
                    isp: data.isp || 'unknown',
                    timezone: data.time_zone?.name || 'unknown',
                    zip: data.zipcode || 'unknown',
                    source: 'ipgeolocation.io'
                })
            },
            {
                url: 'https://ip-api.com/json/',
                parser: (data) => ({
                    ip: data.query || 'unknown',
                    city: data.city || 'unknown',
                    region: data.regionName || 'unknown',
                    country: data.country || 'unknown',
                    country_code: data.countryCode || 'unknown',
                    lat: data.lat || '0',
                    lon: data.lon || '0',
                    isp: data.isp || 'unknown',
                    timezone: data.timezone || 'unknown',
                    zip: data.zip || 'unknown',
                    source: 'ip-api.com'
                })
            },
            {
                url: 'https://api.ip2location.io/?format=json',
                parser: (data) => ({
                    ip: data.ip || 'unknown',
                    city: data.city_name || 'unknown',
                    region: data.region_name || 'unknown',
                    country: data.country_name || 'unknown',
                    country_code: data.country_code || 'unknown',
                    lat: data.latitude || '0',
                    lon: data.longitude || '0',
                    isp: data.isp || 'unknown',
                    timezone: data.time_zone || 'unknown',
                    zip: data.zip_code || 'unknown',
                    source: 'ip2location.io'
                })
            }
        ];

        let currentApiIndex = 0;
        let dataFound = false;

        function tryNextApi() {
            if (currentApiIndex >= apis.length) {
                appendLog('[❌] All IP APIs failed to get location data', 'error');
                // Fallback: try to get just IP
                getIPOnly();
                return;
            }

            const api = apis[currentApiIndex];
            appendLog(`[🔄] Trying ${api.url}...`, 'warning');

            fetch(api.url, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(data => {
                const parsed = api.parser(data);
                if (!parsed || !parsed.ip || parsed.ip === 'unknown' || parsed.ip === '0.0.0.0') {
                    throw new Error('Invalid data');
                }
                
                displayIPData(parsed);
                dataFound = true;
                ipDataCaptured = true;
                return true;
            })
            .catch(error => {
                appendLog(`[❌] API ${currentApiIndex + 1} failed: ${error.message}`, 'error');
                currentApiIndex++;
                tryNextApi();
            });
        }

        function displayIPData(data) {
            // Display IP
            appendLog(`[🌐] IP Address: ${data.ip} (from ${data.source})`, 'ip');
            
            // Display location
            appendLog(`[📍] Location: ${data.city}, ${data.region}, ${data.country} (${data.country_code})`, 'location');
            
            if (data.lat && data.lon && data.lat !== '0' && data.lon !== '0') {
                appendLog(`[📍] Coordinates: ${data.lat}, ${data.lon}`, 'location');
                
                // Generate Google Maps link
                const mapsLink = `https://www.google.com/maps?q=${data.lat},${data.lon}`;
                appendLog(`[📍] Maps: ${mapsLink}`, 'location');
            }
            
            if (data.isp && data.isp !== 'unknown') {
                appendLog(`[📍] ISP: ${data.isp}`, 'location');
            }
            
            if (data.timezone && data.timezone !== 'unknown') {
                appendLog(`[📍] Timezone: ${data.timezone}`, 'location');
            }
            
            if (data.zip && data.zip !== 'unknown') {
                appendLog(`[📍] ZIP Code: ${data.zip}`, 'location');
            }
            
            // Store in sessionStorage
            try {
                sessionStorage.setItem('ip_location_data', JSON.stringify(data));
            } catch(e) {}
            
            appendLog('[✅] IP location data captured', 'success');
            
            // Try to get approximate distance from a known point (just for fun)
            if (data.lat && data.lon && data.lat !== '0' && data.lon !== '0') {
                const lat = parseFloat(data.lat);
                const lon = parseFloat(data.lon);
                // Approximate distance from equator (rough)
                const dist = Math.abs(lat) * 111; // ~111km per degree
                appendLog(`[📍] Approx distance from equator: ${dist.toFixed(0)} km`, 'info');
            }
        }

        function getIPOnly() {
            // Last resort: get only IP without location
            appendLog('[🔄] Trying to get IP only...', 'warning');
            
            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    if (data.ip) {
                        appendLog(`[🌐] IP Address: ${data.ip} (ipify.org)`, 'ip');
                        appendLog('[⚠️] Location data unavailable from this API', 'warning');
                        
                        // Try one more location API with just the IP
                        fetch(`http://ip-api.com/json/${data.ip}`)
                            .then(res => res.json())
                            .then(locData => {
                                if (locData.status === 'success') {
                                    appendLog(`[📍] Location: ${locData.city}, ${locData.regionName}, ${locData.country}`, 'location');
                                    appendLog(`[📍] Coordinates: ${locData.lat}, ${locData.lon}`, 'location');
                                    appendLog(`[📍] ISP: ${locData.isp}`, 'location');
                                    
                                    try {
                                        sessionStorage.setItem('ip_location_data', JSON.stringify(locData));
                                    } catch(e) {}
                                    
                                    ipDataCaptured = true;
                                    appendLog('[✅] IP location data captured (fallback)', 'success');
                                }
                            })
                            .catch(() => {
                                appendLog('[❌] Location data unavailable', 'error');
                            });
                    }
                })
                .catch(err => {
                    appendLog('[❌] Failed to get IP: ' + err.message, 'error');
                });
        }

        // Start trying APIs
        tryNextApi();
    }

    // 3. Document Cookies
    function showCookies() {
        var cookieStr = document.cookie || '(no cookies)';
        appendLog('[🍪] document.cookie:', 'cookie');
        appendLog(`[🍪] ${cookieStr}`, 'cookie');
        
        if (document.cookie !== '') {
            try {
                var cookies = document.cookie.split(';');
                cookies.forEach(function(c) {
                    var parts = c.trim().split('=');
                    if (parts.length === 2) {
                        appendLog(`[🍪] ${parts[0]}: ${parts[1]}`, 'cookie');
                    }
                });
            } catch(e) {}
        } else {
            document.cookie = "poc_test=1; path=/";
            appendLog('[🍪] Test cookie set: poc_test=1', 'cookie');
            appendLog('[🍪] Cookie now: ' + document.cookie, 'cookie');
        }
    }

    // 4. Browser information
    function getBrowserInfo() {
        var ua = navigator.userAgent;
        var browser = 'Unknown';
        if (ua.indexOf('Chrome') > -1) browser = 'Chrome';
        else if (ua.indexOf('Safari') > -1) browser = 'Safari';
        else if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
        else if (ua.indexOf('Edge') > -1) browser = 'Edge';
        else if (ua.indexOf('Opera') > -1) browser = 'Opera';
        
        appendLog(`[🖥️] Browser: ${browser}`, 'info');
        appendLog(`[📱] User Agent: ${ua}`, 'info');
        appendLog(`[📐] Screen: ${screen.width}x${screen.height}`, 'info');
        appendLog(`[💾] Language: ${navigator.language}`, 'info');
        appendLog(`[🕐] Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`, 'info');
    }

    // 5. Execute everything
    getIPAndLocation();
    
    setTimeout(() => {
        showCookies();
    }, 500);

    setTimeout(() => {
        getBrowserInfo();
    }, 800);

    // 6. Final status
    setTimeout(() => {
        appendLog('', 'info');
        appendLog('═══════════════════════════════════', 'info');
        appendLog('[✅] PoC Complete', 'success');
        appendLog('[🔑] All data captured:', 'success');
        appendLog('   • IP Location (IP-based) ✓', 'success');
        appendLog('   • Cookies ✓', 'success');
        appendLog('   • Browser Info ✓', 'success');
        appendLog('[💾] Data stored in sessionStorage', 'success');
        
        // Check if we have stored data
        try {
            var stored = sessionStorage.getItem('ip_location_data');
            if (stored) {
                appendLog('[📊] Location data saved in sessionStorage', 'success');
            }
        } catch(e) {}
        
        const statusDiv = document.createElement('div');
        statusDiv.style.cssText = 'margin-top: 10px; display: flex; align-items: center;';
        statusDiv.innerHTML = `
            <span class="status-dot active"></span>
            <span style="color: #00ff88; font-size: 12px;">Live - Data captured</span>
        `;
        logElement.appendChild(statusDiv);
    }, 3000);

})();
</script>
</body>
</html>
