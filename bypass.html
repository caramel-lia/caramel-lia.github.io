<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PoC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        #output {
            background: #1a1f2a;
            color: #00ff88;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #00ff88;
            max-width: 800px;
            width: 100%;
            min-height: 400px;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
            box-shadow: 0 0 30px rgba(0,255,136,0.1);
            overflow: auto;
        }
        #output .success { color: #00ff88; }
        #output .info { color: #66b3ff; }
        #output .warning { color: #ffaa44; }
        #output .error { color: #ff4466; }
        #output .cookie { color: #ff66ff; }
        #output .ip { color: #ffcc00; }
        #output .location { color: #66ffcc; }
        #output .header { 
            color: #ffffff; 
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        .status-dot.active { background: #00ff88; }
        .status-dot.waiting { background: #ffaa44; }
        .status-dot.error { background: #ff4466; }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.4; transform: scale(0.9); }
        }
        #log {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
            color: #8899bb;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div id="output">
    <div class="header">🔐 PWN2OWN CTF - PoC</div>
    <div id="log">[⏳] Initializing...</div>
</div>

<script>
// ============================================================
// PWN2OWN CTF - PoC (No camera)
// IP & Location + document.cookie
// ============================================================

(function() {
    "use strict";

    const output = document.getElementById('output');
    const logElement = document.getElementById('log');

    function appendLog(message, type = 'info') {
        const classes = {
            'info': 'info',
            'success': 'success',
            'error': 'error',
            'warning': 'warning',
            'cookie': 'cookie',
            'ip': 'ip',
            'location': 'location'
        };
        const className = classes[type] || 'info';
        logElement.innerHTML += `<div class="${className}">${message}</div>`;
        // Auto-scroll
        output.scrollTop = output.scrollHeight;
    }

    // 1. Show initial status
    appendLog('[✅] PoC started', 'success');
    appendLog('[📱] Platform: ' + navigator.userAgent.match(/iPhone|iPad|iPod/i) ? 'iOS' : 
              navigator.userAgent.match(/Android/i) ? 'Android' : 'Desktop', 'info');

    // 2. Get IP and location using ip-api.com (similar to iCanHazIP)
    appendLog('[🌐] Fetching IP and location data...', 'info');

    fetch('http://ip-api.com/json/')
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            if (data.status === 'success') {
                // Display IP
                appendLog(`[🌐] IP Address: ${data.query}`, 'ip');
                
                // Display location details
                appendLog(`[📍] Location: ${data.city}, ${data.regionName}, ${data.country}`, 'location');
                appendLog(`[📍] Coordinates: ${data.lat}, ${data.lon}`, 'location');
                appendLog(`[📍] ISP: ${data.isp}`, 'location');
                appendLog(`[📍] Timezone: ${data.timezone}`, 'location');
                appendLog(`[📍] ZIP Code: ${data.zip}`, 'location');
                
                // Store in sessionStorage
                try {
                    sessionStorage.setItem('ip_info', JSON.stringify(data));
                } catch(e) {}
                
                appendLog('[✅] IP and location data captured', 'success');
            } else {
                appendLog('[❌] Failed to get location data: ' + data.message, 'error');
            }
        })
        .catch(error => {
            appendLog('[❌] Error fetching IP: ' + error.message, 'error');
            
            // Fallback: try alternative API
            appendLog('[🔄] Trying fallback API...', 'warning');
            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    appendLog(`[🌐] IP Address (fallback): ${data.ip}`, 'ip');
                })
                .catch(err => {
                    appendLog('[❌] Fallback also failed: ' + err.message, 'error');
                });
        });

    // 3. Document Cookies
    function showCookies() {
        var cookieStr = document.cookie || '(no cookies)';
        appendLog('[🍪] document.cookie:', 'cookie');
        appendLog(`[🍪] ${cookieStr}`, 'cookie');
        
        // Try to parse cookies
        if (document.cookie !== '') {
            try {
                var cookies = document.cookie.split(';');
                cookies.forEach(function(c) {
                    var parts = c.trim().split('=');
                    if (parts.length === 2) {
                        appendLog(`[🍪] ${parts[0]}: ${parts[1]}`, 'cookie');
                    }
                });
            } catch(e) {}
        } else {
            // Set test cookie if empty
            document.cookie = "poc_test=1; path=/";
            appendLog('[🍪] Test cookie set: poc_test=1', 'cookie');
            appendLog('[🍪] Cookie now: ' + document.cookie, 'cookie');
        }
    }

    // 4. Browser information
    function getBrowserInfo() {
        var ua = navigator.userAgent;
        var browser = 'Unknown';
        if (ua.indexOf('Chrome') > -1) browser = 'Chrome';
        else if (ua.indexOf('Safari') > -1) browser = 'Safari';
        else if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
        else if (ua.indexOf('Edge') > -1) browser = 'Edge';
        else if (ua.indexOf('Opera') > -1) browser = 'Opera';
        
        appendLog(`[🖥️] Browser: ${browser}`, 'info');
        appendLog(`[📱] User Agent: ${ua.substring(0, 60)}...`, 'info');
        appendLog(`[📐] Screen: ${screen.width}x${screen.height}`, 'info');
        appendLog(`[💾] Language: ${navigator.language}`, 'info');
    }

    // 5. Execute everything with delays
    setTimeout(() => {
        showCookies();
    }, 500);

    setTimeout(() => {
        getBrowserInfo();
    }, 800);

    // 6. Final status after all data is gathered
    setTimeout(() => {
        appendLog('', 'info');
        appendLog('═══════════════════════════════════', 'info');
        appendLog('[✅] PoC Complete', 'success');
        appendLog('[🔑] All data captured:', 'success');
        appendLog('   • IP & Location ✓', 'success');
        appendLog('   • Cookies ✓', 'success');
        appendLog('   • Browser Info ✓', 'success');
        appendLog('[💾] Data stored in sessionStorage', 'success');
        
        // Try to get saved IP data
        try {
            var saved = sessionStorage.getItem('ip_info');
            if (saved) {
                var parsed = JSON.parse(saved);
                appendLog(`[📊] Full Data: ${saved.substring(0, 100)}...`, 'info');
            }
        } catch(e) {}
        
        // Add live status dot
        const statusDiv = document.createElement('div');
        statusDiv.style.cssText = 'margin-top: 10px; display: flex; align-items: center;';
        statusDiv.innerHTML = `
            <span class="status-dot active"></span>
            <span style="color: #00ff88; font-size: 12px;">Live - Data captured</span>
        `;
        logElement.appendChild(statusDiv);
    }, 1500);

})();
</script>
</body>
</html>
